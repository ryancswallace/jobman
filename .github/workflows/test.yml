---
name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          check-latest: true
          cache-dependency-path: go.sum

      - name: Verify module files
        run: make mod-check

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Check formatting
        run: golangci-lint fmt --diff

      - name: Validate workflows and shell scripts
        run: make workflow-check shellcheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          check-latest: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: make test

      - name: Check for known vulnerabilities
        run: make vulncheck

      - name: Test build
        run: make build

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: ./coverage.txt
          disable_search: true
          fail_ci_if_error: true

  repository:
    name: Documentation and release configuration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.version
          check-latest: true
          cache-dependency-path: go.sum

      - name: Validate documentation
        run: make docs

      - name: Validate release configuration
        run: make release-check
