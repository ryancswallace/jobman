---
name: Fuzz

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "53 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/model
            target: FuzzParseJobSpecJSON
          - package: ./internal/config
            target: FuzzParseConfiguration
          - package: ./internal/logstore
            target: FuzzScanIndexSafety
          - package: ./internal/logstore
            target: FuzzReaderIndexSafety
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.version
          check-latest: true
          cache-dependency-path: go.sum

      - name: Fuzz
        run: >-
          make fuzz
          FUZZ_PACKAGE=${{ matrix.package }}
          FUZZ_TARGET=${{ matrix.target }}
          FUZZ_TIME=30s
