---
name: Repair stable container alias

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Published stable v-prefixed tag to promote (for example, v1.2.3)
        required: true
        type: string

concurrency:
  group: jobman-release
  cancel-in-progress: false

permissions: read-all

jobs:
  promote:
    name: Verify and promote latest
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
      packages: write
    environment:
      name: main
      url: https://github.com/ryancswallace/jobman/pkgs/container/jobman

    steps:
      - name: Validate requested release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Expected a stable semantic version tag such as v1.2.3." >&2
            exit 1
          fi
          latest_release=$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)
          if [[ "${RELEASE_TAG}" != "${latest_release}" ]]; then
            echo "${RELEASE_TAG} is not GitHub's latest stable release (${latest_release})." >&2
            exit 1
          fi

      - name: Checkout trusted repair code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: >-
            image=moby/buildkit@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify immutable image and repair alias
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          image=ghcr.io/ryancswallace/jobman
          git fetch --force origin \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          release_commit=$(git rev-parse --verify \
            "refs/tags/${RELEASE_TAG}^{commit}")
          if [[ ! "${release_commit}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve the release tag commit." >&2
            exit 1
          fi
          version_digest=$(docker buildx imagetools inspect \
            "${image}:${RELEASE_TAG}" --format '{{.Manifest.Digest}}')
          if [[ ! "${version_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve the immutable release manifest digest." >&2
            exit 1
          fi
          plain_version_digest=$(docker buildx imagetools inspect \
            "${image}:${RELEASE_TAG#v}" --format '{{.Manifest.Digest}}')
          if [[ "${plain_version_digest}" != "${version_digest}" ]]; then
            echo "The v-prefixed and plain version tags resolve differently." >&2
            exit 1
          fi
          cosign verify \
            --certificate-identity \
              'https://github.com/ryancswallace/jobman/.github/workflows/release.yml@refs/heads/main' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${image}@${version_digest}"
          ./devel/container-smoke.sh \
            "${image}@${version_digest}" "${RELEASE_TAG#v}" "${release_commit}"
          docker buildx imagetools create \
            --tag "${image}:latest" \
            "${image}@${version_digest}"

          latest_digest=$(docker buildx imagetools inspect \
            "${image}:latest" --format '{{.Manifest.Digest}}')
          if [[ "${version_digest}" != "${latest_digest}" ]]; then
            echo "latest does not resolve to the verified release digest." >&2
            exit 1
          fi

      - name: Resume post-release maintenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update.yml --repo "${GITHUB_REPOSITORY}" --ref main
