---
name: Soak

on:
  schedule:
    - cron: "17 3 * * 6"
  workflow_dispatch:
    inputs:
      duration:
        description: Go duration to run each soak scenario
        required: false
        default: 5m
        type: string

permissions:
  contents: read

concurrency:
  group: soak-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soak:
    name: Storage, logs, cleanup, and fairness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.version
          check-latest: true
          cache-dependency-path: go.sum

      - name: Run race-enabled soak suite
        env:
          SOAK_TIME: ${{ inputs.duration || '5m' }}
        run: make soaktest SOAK_TIME="${SOAK_TIME}" SOAK_TIMEOUT=25m
