---
version: 2

project_name: jobman

before:
  hooks:
    # A release must use the dependency graph committed with the tag.
    - go mod download
    - go mod verify
    - make gen-manpage gen-completions

builds:
  - id: jobman
    main: .
    binary: jobman
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      # Go does not support 32-bit Darwin.
      - goos: darwin
        goarch: "386"

archives:
  - id: jobman
    ids:
      - jobman
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- with .Arm }}v{{ . }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - src: etc/jobman/jobman.yml
        dst: etc/jobman
      - src: docs/manpage/jobman*.1
        dst: docs/manpage
      - src: docs/completions/**
        dst: docs/completions

nfpms:
  - id: jobman
    ids:
      - jobman
    package_name: jobman
    vendor: jobman contributors
    homepage: https://github.com/ryancswallace/jobman
    maintainer: Ryan Wallace <ryancswallace@gmail.com>
    description: >-
      A daemon-less command line job manager with retries, timeouts, logging,
      notifications, and more.
    license: MIT
    section: utils
    priority: optional
    formats:
      - apk
      - deb
      - rpm
    contents:
      - src: etc/jobman/jobman.yml
        dst: /etc/jobman/jobman.yml
        type: config|noreplace
      - src: docs/manpage/jobman.1
        dst: /usr/share/man/man1/jobman.1
      - src: docs/completions/bash/jobman
        dst: /usr/share/bash-completion/completions/jobman
      - src: docs/completions/zsh/_jobman
        dst: /usr/share/zsh/vendor-completions/_jobman

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# Generate SPDX JSON SBOMs for both portable archives and native packages.
sboms:
  - id: archives
    artifacts: archive
  - id: packages
    artifacts: package

# Keyless Sigstore signing produces a bundle that contains the signature,
# certificate, and transparency-log proof for the checksum file.
signs:
  - id: checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes

homebrew_casks:
  - name: jobman
    ids:
      - jobman
    binaries:
      - jobman
    manpages:
      - docs/manpage/jobman.1
    completions:
      bash: docs/completions/bash/jobman
      zsh: docs/completions/zsh/_jobman
    homepage: https://github.com/ryancswallace/jobman
    description: >-
      A daemon-less command line job manager with retries, timeouts, logging,
      notifications, and more.
    license: MIT
    directory: Casks
    skip_upload: auto
    repository:
      owner: ryancswallace
      name: jobman
      branch: main
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "chore(homebrew): update jobman to {{ .Tag }} [skip ci]"

dockers_v2:
  - id: jobman
    ids:
      - jobman
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/ryancswallace/jobman
    tags:
      - "{{ .Version }}"
      - "{{ .Tag }}"
      - '{{ if not .Prerelease }}latest{{ end }}'
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true
    labels:
      org.opencontainers.image.title: jobman
      org.opencontainers.image.description: >-
        A daemon-less command line job manager
      org.opencontainers.image.url: https://github.com/ryancswallace/jobman
      org.opencontainers.image.source: https://github.com/ryancswallace/jobman
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: MIT

# Sign the multi-platform image and its platform-specific images by immutable
# digest using the same keyless Actions identity as the checksum bundle.
docker_signs:
  - id: containers
    cmd: cosign
    artifacts: all
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore(?:\([^)]*\))?:'
      - '^ci(?:\([^)]*\))?:'
      - '^docs(?:\([^)]*\))?:'
      - '^test(?:\([^)]*\))?:'
      - '^Merge '

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot.{{ .ShortCommit }}"

release:
  github:
    owner: ryancswallace
    name: jobman
  draft: false
  prerelease: auto
  mode: keep-existing
  replace_existing_artifacts: true
  footer: |
    **Install and verify:** see [RELEASE.md](https://github.com/ryancswallace/jobman/blob/main/RELEASE.md#verifying-a-release).
