---
version: 2

project_name: jobman

before:
  hooks:
    # A release must use the dependency graph committed with the tag.
    - go mod download
    - go mod verify
    - make notices-check
    - make release-changelog
    - make gen-manpage gen-completions

builds:
  - id: jobman
    main: .
    binary: jobman
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -mod=readonly
    ldflags:
      - -s -w -buildid=
      - -X github.com/ryancswallace/jobman/internal/buildinfo.Version={{ .Version }}
      - -X github.com/ryancswallace/jobman/internal/buildinfo.Commit={{ .FullCommit }}
      - -X github.com/ryancswallace/jobman/internal/buildinfo.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      # Go does not support 32-bit Darwin.
      - goos: darwin
        goarch: "386"

archives:
  - id: jobman
    ids:
      - jobman
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- with .Arm }}v{{ . }}{{ end }}
    files:
      - LICENSE
      - THIRD_PARTY_NOTICES.md
      - README.md
      - CODE_OF_CONDUCT.md
      - CONTRIBUTING.md
      - RELEASE.md
      - SECURITY.md
      - SUPPORT.md
      - src: assets/logo.svg
        dst: assets/logo.svg
      - src: assets/logo-dark-transparent.svg
        dst: assets/logo-dark-transparent.svg
      - src: .release-generated/CHANGELOG.md
        strip_parent: true
      - CITATION.cff
      - src: etc/jobman/jobman.yml
        dst: etc/jobman/jobman.yml
      - src: docs/manpage/jobman*.1
        dst: docs/manpage
      - src: docs/*.md
        dst: docs
      - src: docs/design/*.md
        dst: docs/design
      - src: docs/design/adr/*.md
        dst: docs/design/adr
      # List generated completions explicitly so repository scaffolding such as
      # README.md and .gitkeep files cannot leak into release archives.
      - src: docs/completions/bash/jobman
        dst: docs/completions/bash/jobman
      - src: docs/completions/zsh/_jobman
        dst: docs/completions/zsh/_jobman
      - src: docs/completions/powershell/jobman.ps1
        dst: docs/completions/powershell/jobman.ps1

nfpms:
  - id: jobman
    ids:
      - jobman
    package_name: jobman
    vendor: jobman contributors
    homepage: https://github.com/ryancswallace/jobman
    maintainer: Ryan Wallace <ryancswallace@gmail.com>
    description: >-
      A daemon-less command line job manager with retries, timeouts, logging,
      notifications, and more.
    license: MIT
    section: utils
    priority: optional
    formats:
      - apk
      - deb
      - rpm
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/jobman/LICENSE
      - src: THIRD_PARTY_NOTICES.md
        dst: /usr/share/licenses/jobman/THIRD_PARTY_NOTICES.md
      - src: etc/jobman/jobman.yml
        dst: /etc/jobman/jobman.yml
        type: config|noreplace
      - src: docs/manpage/jobman*.1
        dst: /usr/share/man/man1/
      - src: docs/completions/bash/jobman
        dst: /usr/share/bash-completion/completions/jobman
      - src: docs/completions/zsh/_jobman
        dst: /usr/share/zsh/vendor-completions/_jobman

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# Record immutable image digests for provenance attestations and verification.
docker_digest:
  name_template: digests.txt

# Generate SPDX JSON SBOMs for both portable archives and native packages.
sboms:
  - id: archives
    artifacts: archive
  - id: packages
    artifacts: package

# Keyless Sigstore signing produces a bundle that contains the signature,
# certificate, and transparency-log proof for the checksum file.
signs:
  - id: checksums
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes

dockers_v2:
  - id: jobman
    ids:
      - jobman
    dockerfile: Dockerfile.goreleaser
    extra_files:
      - LICENSE
      - THIRD_PARTY_NOTICES.md
    images:
      - ghcr.io/ryancswallace/jobman
    tags:
      - "{{ .Version }}"
      - "{{ .Tag }}"
    platforms:
      - linux/amd64
      - linux/arm64
    sbom: true
    labels:
      org.opencontainers.image.title: jobman
      org.opencontainers.image.description: >-
        A daemon-less command line job manager
      org.opencontainers.image.url: https://github.com/ryancswallace/jobman
      org.opencontainers.image.source: https://github.com/ryancswallace/jobman
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: MIT

# Sign the multi-platform image and its platform-specific images by immutable
# digest using the same keyless Actions identity as the checksum bundle.
docker_signs:
  - id: containers
    cmd: cosign
    artifacts: all
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes

changelog:
  sort: asc
  filters:
    exclude:
      - '^chore(?:\([^)]*\))?:'
      - '^ci(?:\([^)]*\))?:'
      - '^docs(?:\([^)]*\))?:'
      - '^test(?:\([^)]*\))?:'
      - '^Merge '

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot.{{ .ShortCommit }}"

release:
  github:
    owner: ryancswallace
    name: jobman
  # Keep every release private until artifacts, attestations, and SLSA
  # provenance have all succeeded. The release workflow publishes the complete
  # draft as its final step.
  draft: true
  use_existing_draft: true
  prerelease: auto
  mode: keep-existing
  replace_existing_artifacts: true
  footer: |
    **Install and verify:** see [RELEASE.md](https://github.com/ryancswallace/jobman/blob/main/RELEASE.md#verifying-a-release).
